<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}">
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chronicle-network.org{{canonicalPath}}">
    <link rel="canonical" href="https://chronicle-network.org{{canonicalPath}}">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="registry-body">
    <main class="registry-shell registry-shell-wide">
      <header class="registry-header">
        <p class="registry-kicker"><a href="/">Chronicle</a></p>
        <h1>{{heading}}</h1>
        <p class="registry-subtitle">{{subtitle}}</p>
      </header>
      <section class="registry-grid">
        {{content}}
      </section>
    </main>
  </body>
</html>
